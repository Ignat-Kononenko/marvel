<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/marvel.css" />
</head>
<body>

<section class="split-option-section">

    <div class="mobile-header d-flex justify-content-center align-items-center bg-white d-lg-none py-4">
        <img src="svg/index/Marvel.svg" alt="Marvel Power Group" height="40">
    </div>

    <div class="center-logo-wrapper d-none d-lg-block">

        <img src="svg/index/marvel-dual-logo.svg" alt="Marvel Dual Logo" >
    </div>

    <div class="d-flex flex-column flex-lg-row w-100 min-vh-100">
        <div class="split-half bg-brand-yellow d-flex flex-column justify-content-center align-items-center text-center">
            <h2 class="split-title text-black">Electricity &<br>Natural Gas</h2>
            <p class="split-subtitle text-black">Regulatory & Commercial Advisory</p>
            <a href="electricity.html" class="btn btn-custom btn-white d-inline-flex align-items-center gap-2">
                EXPLORE MORE 
                <span class="btn-icon d-flex align-items-center">
                    <img src="svg/index/explore-electricity.svg" alt="" >
                </span>
            </a>
        </div>

        <div class="split-half bg-brand-black d-flex flex-column justify-content-center align-items-center text-center">
            <h2 class="split-title text-white">RNG & <br/> Environmental Commodities</h2>
            <p class="split-subtitle text-white">Brokerage & Structured Transactions</p>
            <a href="rng.html" class="btn btn-custom btn-white d-inline-flex align-items-center gap-2">
                EXPLORE MORE 
                <span class="btn-icon d-flex align-items-center">
                    <img src="svg/index/explore-rng.svg" alt="">

                </span>
            </a>
        </div>

    </div>
</section>

</body>
</html>
